name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g., 0.1.1)'
        required: true
        type: string

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-macos:
    runs-on: macos-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Extract changelog for current version
        id: changelog
        run: |
          VERSION="${{ github.event.inputs.version || github.ref_name }}"
          # Remove 'v' prefix if present
          VERSION="${VERSION#v}"

          # Extract content between current version and the next version or end
          CHANGELOG=$(awk -v ver="$VERSION" '
            /^## \[/ { if (found) exit; if ($0 ~ ver) found=1 }
            found { print }
          ' CHANGELOG.md)

          # Save to file for multiline output
          echo "$CHANGELOG" > /tmp/release_notes.md
          echo "file=/tmp/release_notes.md" >> $GITHUB_OUTPUT

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Install dependencies
        run: npm ci

      - name: Build Tauri app (Apple Silicon)
        uses: tauri-apps/tauri-action@v0
        with:
          tagName: ${{ github.event.inputs.version && format('v{0}', github.event.inputs.version) || github.ref_name }}
          releaseName: "UsageMeter ${{ github.event.inputs.version && format('v{0}', github.event.inputs.version) || github.ref_name }}"
          releaseBodyFile: ${{ steps.changelog.outputs.file }}
          releaseDraft: true
          prerelease: false
          args: --target aarch64-apple-darwin
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build Tauri app (Intel)
        uses: tauri-apps/tauri-action@v0
        with:
          tagName: ${{ github.event.inputs.version && format('v{0}', github.event.inputs.version) || github.ref_name }}
          releaseName: "UsageMeter ${{ github.event.inputs.version && format('v{0}', github.event.inputs.version) || github.ref_name }}"
          releaseBodyFile: ${{ steps.changelog.outputs.file }}
          releaseDraft: true
          prerelease: false
          args: --target x86_64-apple-darwin
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
