name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g., 0.1.1)'
        required: true
        type: string

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  verify:
    name: Verify and Prepare
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.value }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Determine version
        id: version
        run: |
          VERSION="${{ github.event.inputs.version || github.ref_name }}"
          VERSION="${VERSION#v}"
          echo "value=$VERSION" >> $GITHUB_OUTPUT
          echo "Version: $VERSION"

      - name: Verify CHANGELOG entry exists
        run: |
          VERSION="${{ steps.version.outputs.value }}"
          if ! grep -q "## \[$VERSION\]" CHANGELOG.md; then
            echo "Error: Version $VERSION not found in CHANGELOG.md"
            echo "Please add a changelog entry for version $VERSION before releasing."
            exit 1
          fi
          echo "Changelog entry found for version $VERSION"

  build-macos:
    name: Build macOS (${{ matrix.target }})
    needs: verify
    runs-on: macos-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-apple-darwin
            arch: Apple Silicon
          - target: x86_64-apple-darwin
            arch: Intel
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Install dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build

      - name: Extract changelog
        id: changelog
        run: |
          VERSION="${{ needs.verify.outputs.version }}"
          NOTES=$(sed -n "/^## \[$VERSION\]/,/^## \[/p" CHANGELOG.md | sed '$d')
          echo "$NOTES" > /tmp/release_notes.md
          echo "Extracted release notes for version $VERSION"

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        with:
          tagName: v${{ needs.verify.outputs.version }}
          releaseName: 'UsageMeter v${{ needs.verify.outputs.version }}'
          releaseBodyFile: /tmp/release_notes.md
          releaseDraft: true
          prerelease: false
          args: --target ${{ matrix.target }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
